<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群聊管理 - {{ plugin_name }}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧群聊列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    群聊列表
                </div>
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索群聊..." autocomplete="off">
                </div>
            </div>
            <div class="group-list" id="groupList">
                <div class="loading-overlay" id="groupLoading">
                    <div class="spinner"></div>
                    <div class="loading-text">加载群聊列表...</div>
                </div>
            </div>
        </aside>

        <!-- 右侧设置面板 -->
        <main class="main-content">
            <div class="content-header">
                <div>
                    <div class="content-title" id="panelTitle">群聊设置</div>
                    <div class="content-subtitle" id="panelSubtitle">请从左侧选择一个群聊</div>
                </div>
                <div class="header-actions" id="headerActions" style="display: none;">
                    <button class="btn btn-secondary" onclick="resetSettings()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"></path>
                        </svg>
                        重置
                    </button>
                    <button class="btn btn-primary" onclick="saveSettings()" id="saveBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        保存设置
                    </button>
                </div>
            </div>
            <div class="content-body" id="contentBody">
                <div class="placeholder-panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <div class="placeholder-text">请从左侧选择一个群聊进行配置</div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
